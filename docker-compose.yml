version: "3.9"

services:
  ocr-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elif-ocr-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./temp_uploads:/app/temp_uploads
    restart: unless-stopped
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ocr-network:
    driver: bridge
